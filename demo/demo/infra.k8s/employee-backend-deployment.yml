apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-backend
  template:
    metadata:
      labels:
        app: employee-backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub-username/employee-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://employee-db:5432/employees
            - name: SPRING_DATASOURCE_USERNAME
              value: employee_user
            - name: SPRING_DATASOURCE_PASSWORD
              value: employee_pass
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: employee-backend
spec:
  selector:
    app: employee-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
